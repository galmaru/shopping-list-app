<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      color: #2d3748;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 12px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 16px;
    }

    .stats span {
      font-weight: 600;
      color: #667eea;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      transition: background 0.15s;
      border: 1px solid transparent;
    }

    li:hover {
      background: #f7fafc;
      border-color: #e2e8f0;
    }

    li.checked {
      opacity: 0.5;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      color: #718096;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .clear-btn:hover {
      border-color: #e53e3e;
      color: #e53e3e;
      background: #fff5f5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." maxlength="60">
      <button onclick="addItem()">추가</button>
    </div>

    <div class="stats" id="stats"></div>

    <ul id="list"></ul>

    <button class="clear-btn" id="clearBtn" onclick="clearChecked()" style="display:none">
      완료된 항목 삭제
    </button>
  </div>

  <script>
    const STORAGE_KEY = 'shopping_list_items';

    let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const stats = document.getElementById('stats');
      const clearBtn = document.getElementById('clearBtn');

      const total = items.length;
      const done = items.filter(i => i.checked).length;

      if (total === 0) {
        list.innerHTML = '<li class="empty">아직 아이템이 없습니다.</li>';
        stats.textContent = '';
        clearBtn.style.display = 'none';
        return;
      }

      stats.innerHTML = `총 <span>${total}</span>개 중 <span>${done}</span>개 완료`;
      clearBtn.style.display = done > 0 ? 'block' : 'none';

      list.innerHTML = items.map((item, idx) => `
        <li class="${item.checked ? 'checked' : ''}">
          <input type="checkbox" ${item.checked ? 'checked' : ''}
            onchange="toggleItem(${idx})">
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="deleteItem(${idx})" title="삭제">✕</button>
        </li>
      `).join('');
    }

    function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, checked: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    function toggleItem(idx) {
      items[idx].checked = !items[idx].checked;
      save();
      render();
    }

    function deleteItem(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
