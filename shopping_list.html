<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f86f7;
    }

    .btn-add {
      padding: 10px 18px;
      background: #4f86f7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-add:hover {
      background: #3b6fd4;
    }

    .btn-add:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }

    .summary {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-bottom: 1px solid #edf2f7;
      transition: background 0.15s;
      border-radius: 8px;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: #f7fafc;
    }

    li.checked .item-name {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .checkbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #4f86f7;
      flex-shrink: 0;
    }

    .item-name {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
    }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e0;
      font-size: 1.2rem;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }

    .btn-delete:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .btn-clear {
      margin-top: 20px;
      width: 100%;
      padding: 9px;
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      color: #718096;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-clear:hover {
      background: #fff5f5;
      color: #e53e3e;
      border-color: #feb2b2;
    }

    .status-bar {
      font-size: 0.8rem;
      color: #a0aec0;
      text-align: right;
      margin-bottom: 8px;
      min-height: 1.2em;
    }

    .status-bar.error {
      color: #e53e3e;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input
        type="text"
        id="itemInput"
        placeholder="아이템 입력 후 추가..."
        maxlength="60"
      />
      <button class="btn-add" id="addBtn" onclick="addItem()">추가</button>
    </div>

    <p class="status-bar" id="statusBar"></p>
    <p class="summary" id="summary"></p>

    <ul id="list"></ul>

    <p class="empty" id="emptyMsg">아직 아이템이 없어요.</p>

    <button class="btn-clear" id="clearBtn" onclick="clearChecked()" style="display:none">
      완료된 항목 삭제
    </button>
  </div>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // Supabase 클라이언트 초기화
    const SUPABASE_URL = 'https://vujupogzrnmntvogovic.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1anVwb2d6cm5tbnR2b2dvdmljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDI5MzcsImV4cCI6MjA4OTQ3ODkzN30.nMX5rZpUc7hhDvXQIcHsHRuohXzm9So_KH-MAKRZy-g';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = []; // { id, name, checked, created_at }

    const listEl    = document.getElementById('list');
    const inputEl   = document.getElementById('itemInput');
    const emptyMsg  = document.getElementById('emptyMsg');
    const summaryEl = document.getElementById('summary');
    const clearBtn  = document.getElementById('clearBtn');
    const addBtn    = document.getElementById('addBtn');
    const statusBar = document.getElementById('statusBar');

    // 상태 메시지 표시
    function setStatus(msg, isError = false) {
      statusBar.textContent = msg;
      statusBar.className = 'status-bar' + (isError ? ' error' : '');
    }

    // 화면 렌더링
    function render() {
      listEl.innerHTML = '';

      items.forEach(item => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        li.innerHTML = `
          <input
            class="checkbox"
            type="checkbox"
            ${item.checked ? 'checked' : ''}
            onchange="toggleCheck('${item.id}')"
          />
          <span class="item-name">${escapeHtml(item.name)}</span>
          <button class="btn-delete" onclick="deleteItem('${item.id}')" title="삭제">✕</button>
        `;

        listEl.appendChild(li);
      });

      emptyMsg.style.display = items.length === 0 ? 'block' : 'none';

      const total = items.length;
      const done  = items.filter(i => i.checked).length;
      summaryEl.textContent = total > 0 ? `${done} / ${total} 완료` : '';
      clearBtn.style.display = done > 0 ? 'block' : 'none';
    }

    // 전체 데이터 불러오기
    async function loadItems() {
      setStatus('불러오는 중...');
      const { data, error } = await supabase
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) {
        setStatus('데이터 불러오기 실패: ' + error.message, true);
        return;
      }

      items = data;
      setStatus('');
      render();
    }

    // 아이템 추가
    async function addItem() {
      const name = inputEl.value.trim();
      if (!name) return;

      addBtn.disabled = true;
      setStatus('저장 중...');

      const { data, error } = await supabase
        .from('shopping_items')
        .insert([{ name, checked: false }])
        .select()
        .single();

      addBtn.disabled = false;

      if (error) {
        setStatus('추가 실패: ' + error.message, true);
        return;
      }

      items.push(data);
      inputEl.value = '';
      setStatus('');
      render();
      inputEl.focus();
    }

    // 체크 상태 토글
    async function toggleCheck(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;

      const newChecked = !item.checked;

      const { error } = await supabase
        .from('shopping_items')
        .update({ checked: newChecked })
        .eq('id', id);

      if (error) {
        setStatus('업데이트 실패: ' + error.message, true);
        render(); // 실패 시 원래 상태로 복원
        return;
      }

      item.checked = newChecked;
      setStatus('');
      render();
    }

    // 아이템 삭제
    async function deleteItem(id) {
      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) {
        setStatus('삭제 실패: ' + error.message, true);
        return;
      }

      items = items.filter(i => i.id !== id);
      setStatus('');
      render();
    }

    // 완료된 항목 일괄 삭제
    async function clearChecked() {
      const checkedIds = items.filter(i => i.checked).map(i => i.id);
      if (checkedIds.length === 0) return;

      setStatus('삭제 중...');

      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .in('id', checkedIds);

      if (error) {
        setStatus('삭제 실패: ' + error.message, true);
        return;
      }

      items = items.filter(i => !i.checked);
      setStatus('');
      render();
    }

    // HTML 이스케이프 (XSS 방지)
    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Enter 키로 추가
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    // 초기 데이터 로드
    loadItems();
  </script>
</body>
</html>
